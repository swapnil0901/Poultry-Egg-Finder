services:
  - type: web
    name: poultry-egg-finder-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:push -- --force
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poultry-egg-finder-db
          property: connectionString

databases:
  - name: poultry-egg-finder-db
    plan: free
    databaseName: poultry_egg_finder
    user: poultry_user
    postgresMajorVersion: "16"
