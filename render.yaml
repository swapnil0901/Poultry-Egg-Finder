services:
  - type: web
    name: poultry-egg-finder-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
